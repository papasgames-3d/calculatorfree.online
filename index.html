<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .calculator {
            background: #000;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            width: 320px;
        }

        .display {
            width: 100%;
            height: 80px;
            font-size: 48px;
            font-weight: 300;
            text-align: right;
            padding: 0 20px;
            margin-bottom: 20px;
            border: none;
            border-radius: 12px;
            background: #000;
            color: #fff;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 70px;
            font-size: 32px;
            font-weight: 400;
            border: none;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }

        /* Hàng 1: Clear, +/-, %, ÷ */
        .function {
            background: #a6a6a6;
            color: #000;
        }

        /* Cột phải: Operators */
        .operator {
            background: #ff9500;
            color: #fff;
            font-size: 40px;
        }

        /* Numbers */
        .number {
            background: #333;
            color: #fff;
        }

        /* Số 0 chiếm 2 cột */
        .zero {
            grid-column: span 2;
            text-align: left;
            padding-left: 30px;
        }

        /* Active states */
        .operator.active {
            background: #fff;
            color: #ff9500;
        }

        button:hover {
            opacity: 0.8;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" value="0" readonly>
        
        <div class="buttons">
            <!-- Hàng 1 -->
            <button class="function" onclick="clearAll()">AC</button>
            <button class="function" onclick="toggleSign()">+/-</button>
            <button class="function" onclick="percentage()">%</button>
            <button class="operator" id="divide" onclick="setOperator('/')">÷</button>
            
            <!-- Hàng 2 -->
            <button class="number" onclick="inputNumber('7')">7</button>
            <button class="number" onclick="inputNumber('8')">8</button>
            <button class="number" onclick="inputNumber('9')">9</button>
            <button class="operator" id="multiply" onclick="setOperator('*')">×</button>
            
            <!-- Hàng 3 -->
            <button class="number" onclick="inputNumber('4')">4</button>
            <button class="number" onclick="inputNumber('5')">5</button>
            <button class="number" onclick="inputNumber('6')">6</button>
            <button class="operator" id="subtract" onclick="setOperator('-')">−</button>
            
            <!-- Hàng 4 -->
            <button class="number" onclick="inputNumber('1')">1</button>
            <button class="number" onclick="inputNumber('2')">2</button>
            <button class="number" onclick="inputNumber('3')">3</button>
            <button class="operator" id="add" onclick="setOperator('+')">+</button>
            
            <!-- Hàng 5 -->
            <button class="number zero" onclick="inputNumber('0')">0</button>
            <button class="number" onclick="inputDecimal()">.</button>
            <button class="operator" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentValue = '0';
        let previousValue = null;
        let operator = null;
        let waitingForNewValue = false;

        function updateDisplay() {
            display.value = currentValue;
        }

        function inputNumber(num) {
            if (waitingForNewValue) {
                currentValue = num;
                waitingForNewValue = false;
            } else {
                currentValue = currentValue === '0' ? num : currentValue + num;
            }
            updateDisplay();
        }

        function inputDecimal() {
            if (waitingForNewValue) {
                currentValue = '0.';
                waitingForNewValue = false;
            } else if (currentValue.indexOf('.') === -1) {
                currentValue += '.';
            }
            updateDisplay();
        }

        function setOperator(nextOperator) {
            const inputValue = parseFloat(currentValue);

            if (previousValue === null) {
                previousValue = inputValue;
            } else if (operator) {
                const result = performCalculation();
                currentValue = String(result);
                previousValue = result;
                updateDisplay();
            }

            waitingForNewValue = true;
            operator = nextOperator;
            
            // Highlight active operator
            clearActiveOperators();
            const operatorMap = {'+': 'add', '-': 'subtract', '*': 'multiply', '/': 'divide'};
            const buttonId = operatorMap[nextOperator];
            if (buttonId) {
                document.getElementById(buttonId).classList.add('active');
            }
        }

        function calculate() {
            const inputValue = parseFloat(currentValue);

            if (previousValue !== null && operator) {
                const result = performCalculation();
                currentValue = String(result);
                previousValue = null;
                operator = null;
                waitingForNewValue = true;
                updateDisplay();
            }
            
            clearActiveOperators();
        }

        function performCalculation() {
            const prev = previousValue;
            const current = parseFloat(currentValue);

            switch (operator) {
                case '+':
                    return prev + current;
                case '-':
                    return prev - current;
                case '*':
                    return prev * current;
                case '/':
                    return current !== 0 ? prev / current : 0;
                default:
                    return current;
            }
        }

        function clearAll() {
            currentValue = '0';
            previousValue = null;
            operator = null;
            waitingForNewValue = false;
            clearActiveOperators();
            updateDisplay();
        }

        function toggleSign() {
            if (currentValue !== '0') {
                currentValue = currentValue.startsWith('-') 
                    ? currentValue.slice(1) 
                    : '-' + currentValue;
                updateDisplay();
            }
        }

        function percentage() {
            currentValue = String(parseFloat(currentValue) / 100);
            updateDisplay();
        }

        function clearActiveOperators() {
            document.querySelectorAll('.operator').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        // Keyboard support
        document.addEventListener('keydown', function(event) {
            if (event.key >= '0' && event.key <= '9') {
                inputNumber(event.key);
            } else if (event.key === '.') {
                inputDecimal();
            } else if (event.key === '+') {
                setOperator('+');
            } else if (event.key === '-') {
                setOperator('-');
            } else if (event.key === '*') {
                setOperator('*');
            } else if (event.key === '/') {
                event.preventDefault();
                setOperator('/');
            } else if (event.key === 'Enter' || event.key === '=') {
                calculate();
            } else if (event.key === 'Escape') {
                clearAll();
            } else if (event.key === 'Backspace') {
                if (currentValue.length > 1) {
                    currentValue = currentValue.slice(0, -1);
                } else {
                    currentValue = '0';
                }
                updateDisplay();
            }
        });
    </script>
</body>
</html>
