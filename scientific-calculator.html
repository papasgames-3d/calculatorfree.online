<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        /* Left Panel - Main Calculator */
        .main-panel {
            display: flex;
            flex-direction: column;
        }

        .title {
            text-align: center;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Display Area */
        .display-area {
            background: rgba(0,0,0,0.8);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .expression {
            width: 100%;
            background: none;
            border: none;
            color: #88c999;
            font-size: 16px;
            font-family: 'SF Mono', monospace;
            text-align: right;
            margin-bottom: 10px;
            outline: none;
        }

        .result {
            width: 100%;
            background: none;
            border: none;
            color: #00ff88;
            font-size: 36px;
            font-family: 'SF Mono', monospace;
            text-align: right;
            font-weight: 300;
            outline: none;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .mode-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #ff6b6b;
            border-color: #ff6b6b;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
        }

        /* Scientific Functions */
        .scientific-functions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        /* Numpad Layout */
        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
        }

        /* Button Styles */
        button {
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            height: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Button Types */
        .btn-number {
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 18px;
        }

        .btn-operator {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: #fff;
            font-size: 16px;
        }

        .btn-function {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: #fff;
            font-size: 13px;
        }

        .btn-scientific {
            background: linear-gradient(45deg, #a8edea, #fed6e3);
            color: #333;
            font-size: 11px;
            font-weight: 700;
        }

        .btn-memory {
            background: linear-gradient(45deg, #ffecd2, #fcb69f);
            color: #333;
            font-size: 12px;
            font-weight: 700;
        }

        .btn-equals {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: #fff;
            font-size: 18px;
            grid-row: span 2;
        }

        .btn-zero {
            grid-column: span 2;
        }

        /* Right Panel - Memory & History */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-section {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            flex: 1;
        }

        .panel-title {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .memory-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #bdc3c7;
            font-size: 12px;
        }

        .memory-value {
            color: #4ecdc4;
            font-family: 'SF Mono', monospace;
            font-weight: 600;
        }

        .list-container {
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .list-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #bdc3c7;
            font-size: 12px;
            font-family: 'SF Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .list-item:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            padding-left: 8px;
        }

        .clear-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .calculator {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            .scientific-functions {
                grid-template-columns: repeat(6, 1fr);
            }
            
            button {
                height: 45px;
                font-size: 12px;
            }
        }

        /* Scrollbar */
        .list-container::-webkit-scrollbar {
            width: 4px;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        .error {
            color: #ff6b6b !important;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 20%, 40%, 60%, 80% { transform: translateX(-2px); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(2px); }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Main Calculator Panel -->
        <div class="main-panel">
            <h1 class="title">🧮 Scientific Calculator</h1>
            
            <!-- Display -->
            <div class="display-area">
                <input type="text" class="expression" id="expression" placeholder="Expression..." readonly>
                <input type="text" class="result" id="result" value="0" readonly>
            </div>

            <!-- Mode Selector -->
            <div class="mode-selector">
                <button class="mode-btn active" id="deg" onclick="setMode('angle', 'deg')">DEG</button>
                <button class="mode-btn" id="rad" onclick="setMode('angle', 'rad')">RAD</button>
                <button class="mode-btn active" id="normal" onclick="setMode('notation', 'normal')">NORMAL</button>
                <button class="mode-btn" id="scientific" onclick="setMode('notation', 'scientific')">SCI</button>
            </div>

            <!-- Button Grid -->
            <div class="button-grid">
                <!-- Scientific Functions -->
                <div class="scientific-functions">
                    <!-- Row 1: Memory -->
                    <button class="btn-memory" onclick="memoryClear()">MC</button>
                    <button class="btn-memory" onclick="memoryRecall()">MR</button>
                    <button class="btn-memory" onclick="memoryAdd()">M+</button>
                    <button class="btn-memory" onclick="memoryStore()">MS</button>

                    <!-- Row 2: Clear -->
                    <button class="btn-function" onclick="clearAll()">AC</button>
                    <button class="btn-function" onclick="clearEntry()">CE</button>
                    <button class="btn-function" onclick="deleteLast()">⌫</button>
                    <button class="btn-function" onclick="toggleSign()">±</button>

                    <!-- Row 3: Trig -->
                    <button class="btn-scientific" onclick="inputFunction('sin(')">sin</button>
                    <button class="btn-scientific" onclick="inputFunction('cos(')">cos</button>
                    <button class="btn-scientific" onclick="inputFunction('tan(')">tan</button>
                    <button class="btn-scientific" onclick="inputConstant('π')">π</button>

                    <!-- Row 4: Inverse Trig -->
                    <button class="btn-scientific" onclick="inputFunction('asin(')">asin</button>
                    <button class="btn-scientific" onclick="inputFunction('acos(')">acos</button>
                    <button class="btn-scientific" onclick="inputFunction('atan(')">atan</button>
                    <button class="btn-scientific" onclick="inputConstant('e')">e</button>

                    <!-- Row 5: Log -->
                    <button class="btn-scientific" onclick="inputFunction('ln(')">ln</button>
                    <button class="btn-scientific" onclick="inputFunction('log(')">log</button>
                    <button class="btn-scientific" onclick="inputFunction('exp(')">e^x</button>
                    <button class="btn-scientific" onclick="inputFunction('pow(10,')">10^x</button>

                    <!-- Row 6: Powers -->
                    <button class="btn-scientific" onclick="inputFunction('pow(', '²')">x²</button>
                    <button class="btn-scientific" onclick="inputFunction('sqrt(')">√x</button>
                    <button class="btn-scientific" onclick="inputFunction('pow(', 'y')">x^y</button>
                    <button class="btn-scientific" onclick="inputFunction('pow(', '1/')">1/x</button>

                    <!-- Row 7: Advanced -->
                    <button class="btn-scientific" onclick="inputFunction('abs(')">|x|</button>
                    <button class="btn-scientific" onclick="inputFunction('factorial(')">n!</button>
                    <button class="btn-function" onclick="inputOperator('(')">(</button>
                    <button class="btn-function" onclick="inputOperator(')')">)</button>
                </div>

                <!-- Standard Numpad -->
                <div class="numpad">
                    <!-- Row 1: Operations -->
                    <button class="btn-function" onclick="inputOperator('%')">%</button>
                    <button class="btn-operator" onclick="inputOperator('/')">÷</button>
                    <button class="btn-operator" onclick="inputOperator('*')">×</button>
                    <button class="btn-function" onclick="deleteLast()">⌫</button>

                    <!-- Row 2: 7-8-9-minus -->
                    <button class="btn-number" onclick="inputNumber('7')">7</button>
                    <button class="btn-number" onclick="inputNumber('8')">8</button>
                    <button class="btn-number" onclick="inputNumber('9')">9</button>
                    <button class="btn-operator" onclick="inputOperator('-')">−</button>

                    <!-- Row 3: 4-5-6-plus -->
                    <button class="btn-number" onclick="inputNumber('4')">4</button>
                    <button class="btn-number" onclick="inputNumber('5')">5</button>
                    <button class="btn-number" onclick="inputNumber('6')">6</button>
                    <button class="btn-operator" onclick="inputOperator('+')">+</button>

                    <!-- Row 4: 1-2-3-equals(tall) -->
                    <button class="btn-number" onclick="inputNumber('1')">1</button>
                    <button class="btn-number" onclick="inputNumber('2')">2</button>
                    <button class="btn-number" onclick="inputNumber('3')">3</button>
                    <button class="btn-equals" onclick="calculate()">=</button>

                    <!-- Row 5: 0(wide)-decimal -->
                    <button class="btn-number btn-zero" onclick="inputNumber('0')">0</button>
                    <button class="btn-number" onclick="inputDecimal()">.</button>
                </div>
            </div>
        </div>

        <!-- Side Panel -->
        <div class="side-panel">
            <!-- Memory Section -->
            <div class="panel-section">
                <div class="panel-title">💾 Memory</div>
                <div class="memory-info">
                    <span>Current: <span class="memory-value" id="memory-display">0</span></span>
                    <span>Items: <span id="memory-count">0</span></span>
                </div>
                <div class="list-container" id="memory-list"></div>
                <button class="clear-btn" onclick="memoryClear()">Clear Memory</button>
            </div>

            <!-- History Section -->
            <div class="panel-section">
                <div class="panel-title">📚 History</div>
                <div class="memory-info">
                    <span>Recent calculations</span>
                    <span>Count: <span id="history-count">0</span></span>
                </div>
                <div class="list-container" id="history-list"></div>
                <button class="clear-btn" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>

    <script>
        // Global Variables
        let currentValue = '0';
        let expression = '';
        let angleMode = 'deg';
        let notationMode = 'normal';
        let memory = 0;
        let memoryStorage = [];
        let history = [];
        let lastResult = 0;

        // DOM Elements
        const expressionDisplay = document.getElementById('expression');
        const resultDisplay = document.getElementById('result');
        const memoryDisplay = document.getElementById('memory-display');
        const memoryCount = document.getElementById('memory-count');
        const historyCount = document.getElementById('history-count');
        const memoryList = document.getElementById('memory-list');
        const historyList = document.getElementById('history-list');

        // Initialize
        updateDisplay();
        updateMemoryDisplay();
        updateHistoryDisplay();

        // Basic Input Functions
        function inputNumber(num) {
            if (currentValue === '0' || currentValue === 'Error') {
                currentValue = num;
            } else {
                currentValue += num;
            }
            expression += num;
            updateDisplay();
        }

        function inputDecimal() {
            if (!currentValue.includes('.')) {
                currentValue += '.';
                expression += '.';
                updateDisplay();
            }
        }

        function inputOperator(op) {
            if (expression && !isNaN(expression.slice(-1))) {
                expression += ` ${op} `;
                currentValue = '0';
                updateDisplay();
            }
        }

        function inputFunction(func, suffix = '') {
            if (suffix) {
                if (suffix === '²') {
                    expression += `pow(${currentValue}, 2)`;
                } else if (suffix === 'y') {
                    expression += `pow(${currentValue}, `;
                } else if (suffix === '1/') {
                    expression += `pow(${currentValue}, -1)`;
                }
            } else {
                expression += func;
            }
            currentValue = '0';
            updateDisplay();
        }

        function inputConstant(constant) {
            let value;
            if (constant === 'π') {
                value = Math.PI;
                expression += 'π';
            } else if (constant === 'e') {
                value = Math.E;
                expression += 'e';
            }
            currentValue = value.toString();
            updateDisplay();
        }

        // Calculate Function
        function calculate() {
            try {
                let expr = expression
                    .replace(/π/g, Math.PI)
                    .replace(/e(?![x])/g, Math.E)
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-');

                // Handle angle conversions
                expr = convertAngleFunctions(expr);

                // Replace function names
                expr = expr
                    .replace(/pow\(/g, 'Math.pow(')
                    .replace(/sqrt\(/g, 'Math.sqrt(')
                    .replace(/ln\(/g, 'Math.log(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/exp\(/g, 'Math.exp(')
                    .replace(/abs\(/g, 'Math.abs(')
                    .replace(/factorial\(/g, 'factorial(');

                const result = eval(expr);

                if (isNaN(result) || !isFinite(result)) {
                    throw new Error('Invalid calculation');
                }

                const formattedResult = formatNumber(result);
                addToHistory(`${expression} = ${formattedResult}`);
                lastResult = result;
                currentValue = formattedResult;
                expression = '';
                updateDisplay();

            } catch (error) {
                currentValue = 'Error';
                resultDisplay.classList.add('error');
                setTimeout(() => resultDisplay.classList.remove('error'), 1000);
                updateDisplay();
            }
        }

        // Helper Functions
        function convertAngleFunctions(expr) {
            const trigFunctions = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan'];
            
            trigFunctions.forEach(func => {
                const regex = new RegExp(`${func}\$([^)]+)\$`, 'g');
                expr = expr.replace(regex, (match, arg) => {
                    if (['sin', 'cos', 'tan'].includes(func) && angleMode === 'deg') {
                        return `Math.${func}(${arg} * Math.PI / 180)`;
                    } else if (['asin', 'acos', 'atan'].includes(func) && angleMode === 'deg') {
                        return `(Math.${func}(${arg}) * 180 / Math.PI)`;
                    }
                    return `Math.${func}(${arg})`;
                });
            });
            
            return expr;
        }

        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        function formatNumber(num) {
            if (notationMode === 'scientific') {
                return num.toExponential(6);
            } else {
                return parseFloat(num.toPrecision(12)).toString();
            }
        }

        // Clear Functions
        function clearAll() {
            currentValue = '0';
            expression = '';
            updateDisplay();
        }

        function clearEntry() {
            currentValue = '0';
            updateDisplay();
        }

        function deleteLast() {
            if (expression.length > 0) {
                expression = expression.slice(0, -1);
                if (currentValue.length > 1) {
                    currentValue = currentValue.slice(0, -1);
                } else {
                    currentValue = '0';
                }
                updateDisplay();
            }
        }

        function toggleSign() {
            if (currentValue !== '0' && currentValue !== 'Error') {
                currentValue = currentValue.startsWith('-') ? currentValue.slice(1) : '-' + currentValue;
                updateDisplay();
            }
        }

        // Mode Functions
        function setMode(type, mode) {
            if (type === 'angle') {
                angleMode = mode;
                document.querySelectorAll('#deg, #rad').forEach(btn => btn.classList.remove('active'));
                document.getElementById(mode).classList.add('active');
            } else if (type === 'notation') {
                notationMode = mode;
                document.querySelectorAll('#normal, #scientific').forEach(btn => btn.classList.remove('active'));
                document.getElementById(mode).classList.add('active');
            }
        }

        // Memory Functions
        function memoryClear() {
            memory = 0;
            memoryStorage = [];
            updateMemoryDisplay();
        }

        function memoryRecall() {
            currentValue = formatNumber(memory);
            expression = formatNumber(memory);
            updateDisplay();
        }

        function memoryAdd() {
            memory += parseFloat(currentValue) || 0;
            updateMemoryDisplay();
        }

        function memoryStore() {
            memory = parseFloat(currentValue) || 0;
            memoryStorage.unshift({
                value: memory,
                timestamp: new Date().toLocaleTimeString()
            });
            if (memoryStorage.length > 10) memoryStorage.pop();
            updateMemoryDisplay();
        }

        function updateMemoryDisplay() {
            memoryDisplay.textContent = formatNumber(memory);
            memoryCount.textContent = memoryStorage.length;
            
            memoryList.innerHTML = memoryStorage.map(item => 
                `<div class="list-item" onclick="recallMemory(${item.value})">
                    ${formatNumber(item.value)} | ${item.timestamp}
                </div>`
            ).join('');
        }

        function recallMemory(value) {
            currentValue = formatNumber(value);
            expression = formatNumber(value);
            updateDisplay();
        }

        // History Functions
        function addToHistory(calculation) {
            history.unshift({
                calculation: calculation,
                timestamp: new Date().toLocaleTimeString()
            });
            if (history.length > 20) history.pop();
            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            historyCount.textContent = history.length;
            historyList.innerHTML = history.map(item => 
                `<div class="list-item" onclick="recallHistory('${item.calculation}')">
                    ${item.calculation} | ${item.timestamp}
                </div>`
            ).join('');
        }

        function recallHistory(calculation) {
            const result = calculation.split(' = ')[1];
            currentValue = result;
            expression = '';
            updateDisplay();
        }

        function clearHistory() {
            history = [];
            updateHistoryDisplay();
        }

        // Update Display
        function updateDisplay() {
            expressionDisplay.value = expression;
            resultDisplay.value = currentValue;
        }

        // Keyboard Support
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                inputNumber(key);
            } else if (key === '.') {
                inputDecimal();
            } else if (['+', '-', '*', '/'].includes(key)) {
                inputOperator(key);
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape') {
                clearAll();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
