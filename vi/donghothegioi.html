        .search-icon {

            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.2rem;

        .view-toggle {

            background: var(--light-bg);
            border-radius: var(--border-radius);
            overflow: hidden;

            font-size: 0.9rem;

            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;

            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);

            from {

                transform: translateY(-50px) scale(0.9);

            to {

            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .close-btn {

            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);

        .timezone-item:hover {

            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .timezone-item h4 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        
        .timezone-item p {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        
        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success-gradient);
            color: white;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            z-index: 10000;
            font-weight: 600;
            max-width: 300px;
            animation: slideInRight 0.3s ease;
        }
        
        .notification.error {
            background: var(--danger-gradient);
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @media (max-width: 768px) {

            .time-display {

            .clock-list-item {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .list-city-info,
            .list-time-display,
            .list-timezone-info {
                text-align: center;

            }
            
            .timezone-item {
                background: #333;
                border-color: #555;
            }
            
            .timezone-item:hover {
                background: #444;
            }
        }
    </style>
</head>

        </footer>
    </div>

            <div class="timezone-list" id="timezone-list">

        </div>

        // ==============================================
        // INITIALIZATION
        // ==============================================
        document.addEventListener('DOMContentLoaded', function() {
            // Load saved clocks or use defaults
            loadSavedClocks();
            
            // Start updating clocks
            updateAllClocks();
            updateInterval = setInterval(updateAllClocks, 1000);
            
            // Setup search functionality
            setupSearch();
            
            // Setup modal search
            setupModalSearch();
            
            // Populate timezone list in modal
            populateTimezoneList();
            
            console.log('🌍 World Clock initialized successfully!');
        });
        
        // ==============================================
        // CLOCK MANAGEMENT
        // ==============================================
        function loadSavedClocks() {
            try {
                const saved = localStorage.getItem('worldClocks');
                if (saved) {
                    worldClocks = JSON.parse(saved);
                } else {
                    worldClocks = [...defaultTimezones];
                    saveClocks();
                }
                renderClocks();
            } catch (error) {
                console.error('Error loading saved clocks:', error);
                worldClocks = [...defaultTimezones];
                renderClocks();
            }
        }
        
        function saveClocks() {
            try {
                localStorage.setItem('worldClocks', JSON.stringify(worldClocks));
            } catch (error) {
                console.error('Error saving clocks:', error);
            }
        }
        
        function addTimezone(timezone) {
            // Check if timezone already exists
            const exists = worldClocks.some(clock => clock.timezone === timezone.timezone);
            if (exists) {
                showNotification('Múi giờ này đã được thêm!', 'error');
                return;
            }
            
            worldClocks.push(timezone);
            saveClocks();
            renderClocks();
            closeAddTimezoneModal();
            showNotification(`Đã thêm ${timezone.city}, ${timezone.country}`, 'success');
        }
        
        function removeTimezone(index) {
            if (confirm('Bạn có chắc chắn muốn xóa múi giờ này?')) {
                const removed = worldClocks.splice(index, 1)[0];
                saveClocks();
                renderClocks();
                showNotification(`Đã xóa ${removed.city}, ${removed.country}`, 'success');
            }
        }
        
        // ==============================================
        // TIME CALCULATIONS
        // ==============================================
        function updateAllClocks() {
            updateCurrentTime();
            renderClocks();
        }
        
        function updateCurrentTime() {
            const now = new Date();
            
            // Update current time display
            const timeElement = document.getElementById('current-time');
            const dateElement = document.getElementById('current-date');
            const timezoneElement = document.getElementById('current-timezone');
            
            // Format time
            const timeString = now.toLocaleTimeString('vi-VN', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            timeElement.textContent = timeString;
            
            // Format date
            const dateString = now.toLocaleDateString('vi-VN', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            dateElement.textContent = dateString;
            
            // Show timezone
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const offset = getTimezoneOffset(timezone);
            timezoneElement.textContent = `${offset} (${timezone})`;
        }
        
        function getTimeInTimezone(timezone) {
            const now = new Date();
            return new Date(now.toLocaleString("en-US", {timeZone: timezone}));
        }
        
        function getTimezoneOffset(timezone) {
            const now = new Date();
            const utc = new Date(now.getTime() + (now.getTimezoneOffset() * 60000));
            const local = new Date(utc.toLocaleString("en-US", {timeZone: timezone}));
            const offset = (local.getTime() - utc.getTime()) / (1000 * 60 * 60);
            
            const sign = offset >= 0 ? '+' : '';
            const hours = Math.floor(Math.abs(offset));
            const minutes = Math.floor((Math.abs(offset) % 1) * 60);
            
            return `UTC${sign}${offset >= 0 ? hours : -hours}${minutes > 0 ? `:${minutes.toString().padStart(2, '0')}` : ''}`;
        }
        
        function getTimeDifference(timezone) {
            const localTime = new Date();
            const targetTime = getTimeInTimezone(timezone);
            const diffMs = targetTime.getTime() - localTime.getTime();
            const diffHours = Math.round(diffMs / (1000 * 60 * 60));
            
            if (diffHours === 0) return 'Cùng giờ';
            
            const sign = diffHours > 0 ? '+' : '';
            const absHours = Math.abs(diffHours);
            
            if (absHours === 1) {
                return diffHours > 0 ? '1 giờ trước' : '1 giờ sau';
            }
            
            return diffHours > 0 ? `${absHours} giờ trước` : `${absHours} giờ sau`;
        }
        
        // ==============================================
        // RENDERING FUNCTIONS
        // ==============================================
        function renderClocks() {
            if (currentView === 'grid') {
                renderGridView();
            } else {
                renderListView();
            }
        }
        
        function renderGridView() {
            const container = document.getElementById('world-clocks-grid');
            container.innerHTML = '';
            
            worldClocks.forEach((clock, index) => {
                const clockCard = createClockCard(clock, index);
                container.appendChild(clockCard);
            });
        }
        
        function renderListView() {
            const container = document.getElementById('world-clocks-list');
            container.innerHTML = '';
            
            worldClocks.forEach((clock, index) => {
                const clockItem = createClockListItem(clock, index);
                container.appendChild(clockItem);
            });
        }
        
        function createClockCard(clock, index) {
            const card = document.createElement('div');
            card.className = 'clock-card';
            
            const time = getTimeInTimezone(clock.timezone);
            const timeString = time.toLocaleTimeString('vi-VN', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            const dateString = time.toLocaleDateString('vi-VN', {
                weekday: 'short',
                month: 'short',
                day: 'numeric'
            });
            
            const offset = getTimezoneOffset(clock.timezone);
            const timeDiff = getTimeDifference(clock.timezone);
            
            card.innerHTML = `
                <div class="clock-header">
                    <div class="city-info">
                        <h3>${clock.city}</h3>
                        <div class="country-name">${clock.country}</div>
                    </div>
                    <button class="remove-btn" onclick="removeTimezone(${index})" aria-label="Xóa múi giờ">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <div class="time-display">${timeString}</div>
                <div class="date-display">${dateString}</div>
                
                <div class="timezone-info">
                    <span class="utc-offset">${offset}</span>
                    <span class="time-difference">${timeDiff}</span>
                </div>
            `;
            
            return card;
        }
        
        function createClockListItem(clock, index) {
            const item = document.createElement('div');
            item.className = 'clock-list-item';
            
            const time = getTimeInTimezone(clock.timezone);
            const timeString = time.toLocaleTimeString('vi-VN', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            const offset = getTimezoneOffset(clock.timezone);
            const timeDiff = getTimeDifference(clock.timezone);
            
            item.innerHTML = `
                <div class="list-city-info">
                    <h3>${clock.city}</h3>
                    <div class="country-name">${clock.country}</div>
                </div>
                
                <div class="list-time-display">${timeString}</div>
                
                <div class="list-timezone-info">
                    <div class="utc-offset">${offset}</div>
                    <div class="time-difference">${timeDiff}</div>
                </div>
                
                <button class="remove-btn" onclick="removeTimezone(${index})" aria-label="Xóa múi giờ">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            return item;
        }
        
        // ==============================================
        // VIEW SWITCHING
        // ==============================================
        function switchView(view) {
            currentView = view;
            
            const gridContainer = document.getElementById('world-clocks-grid');
            const listContainer = document.getElementById('world-clocks-list');
            const gridBtn = document.getElementById('grid-view-btn');
            const listBtn = document.getElementById('list-view-btn');
            
            if (view === 'grid') {
                gridContainer.style.display = 'grid';
                listContainer.style.display = 'none';
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
            } else {
                gridContainer.style.display = 'none';
                listContainer.style.display = 'flex';
                listBtn.classList.add('active');
                gridBtn.classList.remove('active');
            }
            
            renderClocks();
        }
        
        // ==============================================
        // SEARCH FUNCTIONALITY
        // ==============================================
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                filterClocks(query);
            });
        }
        
        function filterClocks(query) {
            if (!query) {
                renderClocks();
                return;
            }
            
            const filtered = worldClocks.filter(clock => 
                clock.city.toLowerCase().includes(query) || 
                clock.country.toLowerCase().includes(query)
            );
            
            renderFilteredClocks(filtered);
        }
        
        function renderFilteredClocks(clocks) {
            if (currentView === 'grid') {
                const container = document.getElementById('world-clocks-grid');
                container.innerHTML = '';
                
                clocks.forEach((clock, index) => {
                    const originalIndex = worldClocks.findIndex(c => 
                        c.timezone === clock.timezone
                    );
                    const clockCard = createClockCard(clock, originalIndex);
                    container.appendChild(clockCard);
                });
            } else {
                const container = document.getElementById('world-clocks-list');
                container.innerHTML = '';
                
                clocks.forEach((clock, index) => {
                    const originalIndex = worldClocks.findIndex(c => 
                        c.timezone === clock.timezone
                    );
                    const clockItem = createClockListItem(clock, originalIndex);
                    container.appendChild(clockItem);
                });
            }
        }
        
        // ==============================================
        // MODAL FUNCTIONALITY
        // ==============================================
        function openAddTimezoneModal() {
            const modal = document.getElementById('add-timezone-modal');
            modal.style.display = 'flex';
            
            // Focus on search input
            setTimeout(() => {
                document.getElementById('modal-search').focus();
            }, 100);
        }
        
        function closeAddTimezoneModal() {
            const modal = document.getElementById('add-timezone-modal');
            modal.style.display = 'none';
            
            // Clear search
            document.getElementById('modal-search').value = '';
            populateTimezoneList();
        }
        
        function setupModalSearch() {
            const searchInput = document.getElementById('modal-search');
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                filterTimezoneList(query);
            });
        }
        
        function populateTimezoneList() {
            const container = document.getElementById('timezone-list');
            container.innerHTML = '';
            
            worldTimezones.forEach(timezone => {
                const item = createTimezoneItem(timezone);
                container.appendChild(item);
            });
        }
        
        function filterTimezoneList(query) {
            const container = document.getElementById('timezone-list');
            container.innerHTML = '';
            
            const filtered = worldTimezones.filter(timezone =>
                timezone.city.toLowerCase().includes(query) ||
                timezone.country.toLowerCase().includes(query)
            );
            
            filtered.forEach(timezone => {
                const item = createTimezoneItem(timezone);
                container.appendChild(item);
            });
        }
        
        function createTimezoneItem(timezone) {
            const item = document.createElement('div');
            item.className = 'timezone-item';
            
            const time = getTimeInTimezone(timezone.timezone);
            const timeString = time.toLocaleTimeString('vi-VN', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const offset = getTimezoneOffset(timezone.timezone);
            
            item.innerHTML = `
                <h4>${timezone.city}, ${timezone.country}</h4>
                <p>${timeString} (${offset})</p>
            `;
            
            item.addEventListener('click', () => {
                addTimezone(timezone);
            });
            
            return item;
        }
        
        // ==============================================
        // UTILITY FUNCTIONS
        // ==============================================
        function showNotification(message, type = 'success') {
            // Remove existing notifications
            const existing = document.querySelectorAll('.notification');
            existing.forEach(notif => notif.remove());
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // Auto remove after 4 seconds
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 4000);
        }
        
        // ==============================================
        // EVENT LISTENERS
        // ==============================================
        
        // Close modal when clicking outside
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('add-timezone-modal');
            if (e.target === modal) {
                closeAddTimezoneModal();
            }
        });
        
        // ESC key to close modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAddTimezoneModal();
            }
        });
        
        // Handle page visibility change
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                clearInterval(updateInterval);
            } else {
                updateAllClocks();
                updateInterval = setInterval(updateAllClocks, 1000);
            }
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });
        
        // Handle errors gracefully
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
            showNotification('Đã xảy ra lỗi không mong muốn. Vui lòng tải lại trang.', 'error');
        });
        
        console.log('🌍 World Clock loaded successfully!');
    </script>
